      Core maintainer of OGX (Open GenAI Stack), a composable platform for building LLM applications.
      OpenAI-compatible Responses API, multi-provider inference, vector storage, auth, and more.
      8,000+ stars, multi-language SDKs, Kubernetes operator.

  - name: AI/ML Infrastructure
