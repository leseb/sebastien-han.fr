  - name: Public Speaking
    icon: speaking.svg
    description: |
      Conferences worldwide: KubeCon, OpenStack Summit, CephDays, FOSDEM, DevOps D-Day.
      Presentations, workshops, and panel discussions on storage, cloud-native, and AI.

  - name: Publications
    icon: writing.svg
    description: |
      Technical blog since 2011. 370+ posts covering Ceph, OpenStack, Containers,
      Kubernetes, and AI/ML infrastructure.

