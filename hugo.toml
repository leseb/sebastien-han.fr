baseURL = "https://sebastien-han.fr/"
locale = "en"
title = "Sébastien Han"
disablePathToLower = true
enableRobotsTXT = true
paginate = 10

[permalinks]
  blog = "/blog/:year/:month/:day/:slug/"

[taxonomies]
  tag = "tags"
  category = "categories"

[markup]
  [markup.highlight]
    codeFences = true
    guessSyntax = true
    lineNos = false
    noClasses = false
    style = "dracula"
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4

[outputFormats]
  [outputFormats.RSS]
    mediaType = "application/rss+xml"
    baseName = "atom"

[outputs]
  section = ["HTML", "RSS"]
  home = ["HTML"]

[params]
  author = "Sébastien Han"
  description = "Senior Principal Software Engineer"
  avatar = "/img/avatar.png"
  github = "https://github.com/leseb"
  linkedin = "https://www.linkedin.com/in/s%C3%A9bastien-han-2b522921"
  email = "han.sebastien@gmail.com"

[[menus.main]]
  name = "Blog"
  url = "/blog/"
  weight = 1

[[menus.main]]
  name = "GitHub"
  url = "https://github.com/leseb"
  weight = 2
  [menus.main.params]
    external = true

[[menus.main]]
  name = "LinkedIn"
  url = "https://www.linkedin.com/in/s%C3%A9bastien-han-2b522921"
  weight = 3
  [menus.main.params]
    external = true
